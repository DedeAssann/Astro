object_name: M83
data_root: data
filters:
  - red
  - green
  - blue
align: true
alignment:
  enabled: true
  method: astroalign
  min_area: 12
  detection_sigma: null
  reference: first
  fail_policy: raise
channel_alignment:
  enabled: true
  reference_filter: green
  method: astroalign
  min_area: 12
  fail_policy: raise
sigma: 2
maxiters: 10
stacking:
  normalize_before_stack: false
diagnostics:
  enabled: true
  random_seed: 42
  bins: 100
  lower_percentile: 0.5
  upper_percentile: 99.5
  max_pixels: 1000000
calibration_qc:
  enabled: true
  bias:
    enabled: true
    group_tolerance_adu: 5.0
    reject_outliers: false
  flats:
    enabled: true
    linear_fit_threshold_seconds: 4.0
    saturation_adu: null
    max_mean_fraction_of_saturation: 0.8
    reject_non_linear: false
